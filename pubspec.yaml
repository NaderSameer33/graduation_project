name: etmaen
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.3
  flutter_screenutil: ^5.9.3
  lottie: ^3.3.1
  pin_code_fields: ^8.0.1
  circular_countdown: ^2.1.0
  circular_countdown_timer: ^0.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lotties/

  fonts:
    - family: Cairo

      fonts:
        - asset: assets/fonts/cario_regular.ttf
        - asset: assets/fonts/cairo_bold.ttf
          weight: 700
        - asset: assets/fonts/cario_semi_bold.ttf
          weight: 600
