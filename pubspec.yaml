name: etmaen
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.3
  flutter_screenutil: ^5.9.3
  lottie: ^3.3.1
  pin_code_fields: ^8.0.1
  circular_countdown: ^2.1.0
  circular_countdown_timer: ^0.2.4
  loading_animation_widget: ^1.3.0
  confetti: ^0.8.0
  flutter_advanced_drawer: ^1.5.0
  table_calendar: ^3.2.0
  go_router: ^13.2.0
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  dio: ^5.4.3
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  pinput: ^5.0.0
  google_fonts: ^6.2.1
  intl: ^0.20.2
  equatable: ^2.0.5
  logger: ^2.3.0
  image_picker: ^1.2.1
  flutter_localizations:
    sdk: flutter
  carousel_slider: ^5.1.2
  flutter_credit_card: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lotties/
    - assets/animations/

  fonts:
    - family: Cairo

      fonts:
        - asset: assets/fonts/cario_regular.ttf
        - asset: assets/fonts/cairo_bold.ttf
          weight: 700
        - asset: assets/fonts/cario_semi_bold.ttf
          weight: 600
